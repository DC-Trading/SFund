    const et=new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));

    if(day===0||day===6)return"closed";
    if(mins>=570&&mins<960)return"open";
    if(mins>=480&&mins<570)return"pre";
    return"closed";
  }

    const s=getMarketStatus(), el=document.getElementById("market-status");

    if(c===null||c===undefined||isNaN(c))return null;

    return c.toFixed(3);

      const d=await r.json();

  async function fetchYahoo(sym){
    try{
      const r=await fetch(`${YH_BASE}${encodeURIComponent(sym)}?interval=1d&range=1d`);
      if(!r.ok)return null;
      const data=await r.json();
      const meta=data?.chart?.result?.[0]?.meta;
      if(!meta)return null;
      const c=meta.regularMarketPrice,pc=meta.chartPreviousClose||meta.previousClose;
      if(!c)return null;
      const d=c-pc,dp=pc?(d/pc)*100:0;
      return{c,d,dp,pc};
    }catch{return null;}
  }

  // FRED with dual-proxy fallback
  async function fetchFREDraw(seriesId, limit=24){
    const url=`${FRED_BASE}?series_id=${seriesId}&api_key=${FRED_KEY}&file_type=json&sort_order=asc&limit=${limit}`;
    // Try proxy 1
    try{
      const r=await fetch(PROXY1+encodeURIComponent(url),{signal:AbortSignal.timeout(7000)});
      if(r.ok){
        const d=await r.json();
        if(d?.observations)return d;
      }
    }catch{}
    // Try proxy 2
    try{
      const r=await fetch(PROXY2+encodeURIComponent(url),{signal:AbortSignal.timeout(7000)});
      if(r.ok){
        const txt=await r.text();
        const d=JSON.parse(txt);
        if(d?.observations)return d;
      }
    }catch{}
    // Last resort: direct (works if CORS not blocked)
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(7000)});
      if(r.ok){
        const d=await r.json();
        if(d?.observations)return d;
      }
    }catch{}
    return null;
  }

  async function fetchFRED(seriesId){
    const data=await fetchFREDraw(seriesId,5);
    if(!data)return null;
    const obs=data.observations.filter(o=>o.value!=="."&&!isNaN(parseFloat(o.value)));
    if(!obs.length)return null;
    const latest=obs[obs.length-1];
    return{value:parseFloat(latest.value),date:latest.date};
  }

  async function fetchCPIyoy(){
    const data=await fetchFREDraw("CPIAUCSL",14);
    if(!data)return null;
    const obs=data.observations.filter(o=>o.value!=="."&&!isNaN(parseFloat(o.value)));
    if(obs.length<13)return null;
    const latest=parseFloat(obs[obs.length-1].value);
    const yearAgo=parseFloat(obs[obs.length-13].value);
    const yoy=((latest-yearAgo)/yearAgo)*100;
    return{value:yoy,date:obs[obs.length-1].date};
  }

  // ── Master fetch ──────────────────────────────────────────────────────────
  async function fetchAll(){
    setStatus("loading","Fetching live market data...");
    document.getElementById("refresh-btn").disabled=true;
    updateMarketStatus();

    // Price jobs
    const seen=new Set(),priceJobs=[];
    [...groups.flatMap(g=>g.items),...alertDefs].forEach(item=>{
      if(item.source==="finnhub"||item.source==="yahoo"){
        const k=item.cacheKey;
        if(k&&!seen.has(k)){seen.add(k);priceJobs.push({key:k,source:item.source});}
      }
    });
    for(let i=0;i<priceJobs.length;i++){
      const{key,source}=priceJobs[i];
      const prev=cache[key]?.c??null;
      const q=source==="yahoo"?await fetchYahoo(key):await fetchFinnhub(key);
      cache[key]=q;
      if(q&&prev!==null&&q.c!==prev){
        document.querySelectorAll(`[data-cachekey="${key}"]`).forEach(row=>{
          row.classList.remove("flash-up","flash-dn");
          void row.offsetWidth;
          row.classList.add(q.c>prev?"flash-up":"flash-dn");
        });
      }
      groups.forEach(g=>g.items.forEach(item=>{
        if((item.source==="finnhub"||item.source==="yahoo")&&item.cacheKey===key)updateRow(item);
      }));
      if(i<priceJobs.length-1)await sleep(150);
    }

    // FRED jobs — run in parallel for speed
    const fredItems=groups.flatMap(g=>g.items.filter(i=>i.source==="fred"));
    await Promise.all(fredItems.map(async item=>{
      const result=item.fredYoY?await fetchCPIyoy():await fetchFRED(item.fredId);
      if(result)fredCache[item.fredId]=result;
      updateRow(item);
    }));

    updateSpread();
    updateFOMC();
    updateAlertBar();
    updateOverallSignal();
    setStatus("live","Live — auto-refreshes every 60s");
    document.getElementById("last-update").textContent=
      "Updated: "+new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    document.getElementById("refresh-btn").disabled=false;
    startCountdown();
  }

  const sleep=ms=>new Promise(r=>setTimeout(r,ms));

  // ── Computed rows ─────────────────────────────────────────────────────────
  function updateSpread(){
    const q10=cache["US10Y"],q02=cache["US02Y"];
    const rid="row-2s10s";
    const prEl=document.getElementById("price-"+rid);
    const sgEl=document.getElementById("signal-"+rid);
    if(!prEl||!sgEl)return;
    if(!q10||!q02){
      prEl.innerHTML=`<span style="color:#3a5a7a;font-size:10px;">Awaiting yield data</span>`;
      sgEl.innerHTML=`<span class="signal-badge sig-loading">CALCULATING</span>`;
      return;
    }
    const spread=q10.c-q02.c;
    const cls=spread>=0?"up-price":"dn-price";
    prEl.innerHTML=`<div class="price-val">${spread.toFixed(3)}%</div><div class="price-chg ${cls}">10Y ${q10.c.toFixed(3)}% − 2Y ${q02.c.toFixed(3)}%</div>`;
    const sig=spreadSig(spread);
    sgEl.innerHTML=`<span class="signal-badge ${sig.cls}">${sig.label}</span>`;
  }

  function updateFOMC(){
    const rid="row-FOMC";
    const prEl=document.getElementById("price-"+rid);
    const sgEl=document.getElementById("signal-"+rid);
    if(!prEl||!sgEl)return;
    const next=getNextFOMC();
    const days=next.date?Math.ceil((next.date-new Date())/(864e5)):"";
    prEl.innerHTML=`<div class="price-val" style="font-size:12px;">${next.label}</div>${days?`<div class="price-sub">in ${days} days</div>`:""}`;
    sgEl.innerHTML=`<span class="signal-badge sig-neutral">📅 UPCOMING</span>`;
  }

  // ── Row update ────────────────────────────────────────────────────────────
  const safeId=s=>s.replace(/[^a-zA-Z0-9]/g,"_");

  function updateRow(item){
    const rid="row-"+safeId(item.symbol);
    const priceEl=document.getElementById("price-"+rid);
    const signalEl=document.getElementById("signal-"+rid);
    if(!priceEl||!signalEl)return;

    if(item.source==="fred"){
      const cached=fredCache[item.fredId];
      if(!cached){
        priceEl.innerHTML=`<span class="skeleton" style="width:80px;"></span>`;
        signalEl.innerHTML=`<span class="signal-badge sig-loading">LOADING...</span>`;
        return;
      }
      const v=cached.value;
      const txt=item.fredFmt?item.fredFmt(v):v.toFixed(2);
      priceEl.innerHTML=`<div class="price-val">${txt}</div><div class="price-sub">as of ${cached.date}</div>`;
      const sig=item.fredSigFn(v);
      signalEl.innerHTML=`<span class="signal-badge ${sig.cls}">${sig.label}</span>`;
      return;
    }
    if(item.source==="spread"||item.source==="fomc")return;

    const q=cache[item.cacheKey];
    if(!q){
      priceEl.innerHTML=`<span style="color:#3a5a7a;font-size:10px;">Mkt closed / N/A</span>`;
      signalEl.innerHTML=`<span class="signal-badge sig-loading">— N/A</span>`;
      return;
    }
    const chgClass=q.dp>=0?"up-price":"dn-price";
    const arrow=q.dp>=0?"▲":"▼";
    const priceTxt=fmtPrice(q.c,item.cacheKey)||q.c.toFixed(2);
    const chgTxt=fmtChg(q.d,q.c,item.cacheKey);
    priceEl.innerHTML=`<div class="price-val">${priceTxt}</div><div class="price-chg ${chgClass}">${arrow} ${chgTxt} (${fmtSign(q.dp)}%)</div>`;
    const sig=item.signalFn(q);
    signalEl.innerHTML=`<span class="signal-badge ${sig.cls}">${sig.label}</span>`;
  }

  // ── Alert bar ─────────────────────────────────────────────────────────────
  function buildAlertBar(){
    const bar=document.getElementById("alert-bar");
    bar.innerHTML="";
    alertDefs.forEach(a=>{
      const id="pill-"+safeId(a.label);
      const pill=document.createElement("div");
      pill.className="alert-pill";pill.id=id;
      pill.innerHTML=`<div class="ap-sym">${a.label}</div><div class="ap-level" id="${id}-price"><span class="skeleton" style="width:55px;"></span></div><div class="ap-sig" id="${id}-sig"><span class="skeleton" style="width:65px;"></span></div>`;
      bar.appendChild(pill);
    });
  }

  function updateAlertBar(){
    alertDefs.forEach(a=>{
      const id="pill-"+safeId(a.label);
      const prEl=document.getElementById(id+"-price");
      const sgEl=document.getElementById(id+"-sig");
      const pill=document.getElementById(id);
      const q=cache[a.cacheKey];
      if(!prEl||!sgEl)return;
      if(!q){prEl.textContent="N/A";sgEl.textContent="—";return;}
      const chgClass=q.dp>=0?"up-price":"dn-price";
      const priceTxt=fmtPrice(q.c,a.cacheKey)||q.c.toFixed(2);
      prEl.innerHTML=`<span class="${chgClass}">${priceTxt} (${fmtSign(q.dp)}%)</span>`;
      const sig=a.signalFn(q);
      sgEl.innerHTML=`<span style="color:${sigColor(sig.cls)};font-size:9px;">${sig.label}</span>`;
      if(pill)pill.style.borderColor=sigColor(sig.cls)+"66";
    });
  }

  const sigColor=c=>({"sig-good":"#00cc66","sig-bad":"#ff4466","sig-caution":"#ffaa00"}[c]||"#3b7ec8");

  function updateOverallSignal(){
    let bad=0,caution=0,good=0;
    groups.forEach(g=>g.items.forEach(item=>{
      let sig=null;
      if((item.source==="finnhub"||item.source==="yahoo")&&item.signalFn){const q=cache[item.cacheKey];if(q)sig=item.signalFn(q);}
      else if(item.source==="fred"&&item.fredSigFn){const c=fredCache[item.fredId];if(c)sig=item.fredSigFn(c.value);}
      else if(item.source==="spread"){const q10=cache["US10Y"],q02=cache["US02Y"];if(q10&&q02)sig=spreadSig(q10.c-q02.c);}
      if(!sig)return;
      if(sig.cls==="sig-bad")bad++;
      else if(sig.cls==="sig-caution")caution++;
      else good++;
    }));
    const total=bad+caution+good;
    const valEl=document.getElementById("overall-val"),noteEl=document.getElementById("overall-note");
    if(bad>=6){valEl.textContent="🚨 HIGH RISK";valEl.style.color="#ff4466";noteEl.textContent=`${bad} of ${total} signals negative`;}
    else if(bad>=3){valEl.textContent="⚠ NEAR-TERM CAUTION";valEl.style.color="#ff8844";noteEl.textContent=`${bad} of ${total} signals negative`;}
    else if(caution>=4){valEl.textContent="⚠ MIXED SIGNALS";valEl.style.color="#ffaa00";noteEl.textContent=`${caution} of ${total} cautionary`;}
    else if(good>=5){valEl.textContent="✅ CONSTRUCTIVE";valEl.style.color="#00cc66";noteEl.textContent=`${good} of ${total} signals positive`;}
    else{valEl.textContent="— MONITORING";valEl.style.color="#3b7ec8";noteEl.textContent="Assessing live data...";}
  }

  function setStatus(state,msg){document.getElementById("live-dot").className=state;document.getElementById("status-text").textContent=msg;}

  function startCountdown(){
    if(countdownTimer)clearInterval(countdownTimer);
    countdownSec=60;
    const el=document.getElementById("countdown");
    el.textContent=`Next refresh in ${countdownSec}s`;
    countdownTimer=setInterval(()=>{
      countdownSec--;
      el.textContent=`Next refresh in ${countdownSec}s`;
      if(countdownSec<=0){clearInterval(countdownTimer);el.textContent="";fetchAll();}
    },1000);
  }

  function renderGroups(){
    const container=document.getElementById("watchlist-content");
    container.innerHTML="";
    const visible=activeFilter==="all"?groups:groups.filter(g=>g.id===activeFilter);
    visible.forEach(g=>{
      const rows=g.items.map((item,i)=>{
        const rid="row-"+safeId(item.symbol),ckey=item.cacheKey||"";
        const badge=item.badge?`<span class="star-badge">${item.badge}</span>`:"";
        return`<tr id="${rid}" data-cachekey="${ckey}" class="${i%2===0?"even":"odd"}">
          <td class="td-symbol" style="color:${g.color};border-left:3px solid ${g.color}55;">${item.symbol}</td>
          <td class="td-name">${item.name}${badge}</td>
          <td class="price-cell" id="price-${rid}"><span class="skeleton" style="width:80px;"></span></td>
          <td id="signal-${rid}"><span class="signal-badge sig-loading">LOADING...</span></td>
          <td class="td-note">${item.threshold?`<span class="threshold">${item.threshold}</span>`:""}${item.note}</td>
        </tr>`;
      }).join("");
      container.innerHTML+=`<div class="group"><div class="group-header" style="border-bottom:1px solid ${g.color}44;"><div class="group-title" style="color:${g.color};">${g.category}</div><div class="group-sub">— ${g.subtitle.toUpperCase()}</div></div><div class="table-wrap"><table><thead><tr><th>SYMBOL</th><th>NAME</th><th>LIVE PRICE / CHANGE</th><th>SIGNAL</th><th>THRESHOLD / NOTE</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    });
    groups.forEach(g=>g.items.forEach(item=>{
      if(item.source==="fred"){if(fredCache[item.fredId])updateRow(item);}
      else if(item.source==="spread")updateSpread();
      else if(item.source==="fomc")updateFOMC();
      else if(cache[item.cacheKey])updateRow(item);
    }));
  }

  function renderTabs(){
    const bar=document.getElementById("filter-bar");
    bar.innerHTML="";
    const allBtn=document.createElement("button");
    allBtn.className="tab-btn"+(activeFilter==="all"?" active":"");
    allBtn.textContent="ALL SIGNALS";
    allBtn.onclick=()=>{activeFilter="all";renderTabs();renderGroups();};
    bar.appendChild(allBtn);
    groups.forEach(g=>{
      const btn=document.createElement("button");
      btn.className="tab-btn"+(activeFilter===g.id?" active":"");
      btn.textContent=g.category;
      btn.style.borderColor=activeFilter===g.id?g.color:"#1e3a5f";
      btn.style.color=activeFilter===g.id?g.color:"#5a7a9a";
      btn.onclick=()=>{activeFilter=activeFilter===g.id?"all":g.id;renderTabs();renderGroups();groups.forEach(g2=>g2.items.forEach(item=>updateRow(item)));updateSpread();updateFOMC();updateAlertBar();};
      bar.appendChild(btn);
    });
  }

  const sources=[
    {name:"Yahoo Finance",url:"finance.yahoo.com",note:"^DWCPF — S Fund exact benchmark"},
    {name:"Finnhub.io",url:"finnhub.io",note:"RUT, IWM, MDY, KRE, IYJ, SPY, VIX, US10Y, US02Y, US30Y, DXY, Gold"},
    {name:"FRED (corsproxy.io)",url:"fred.stlouisfed.org",note:"PCE, CPI YoY, ISM PMI, GDP, Jobless Claims, NFCI"},
    {name:"2s10s Spread",url:"Calculated live",note:"US10Y minus US02Y — every refresh"},
    {name:"FOMC Calendar",url:"federalreserve.gov",note:"Auto-advancing with days countdown"},
    {name:"BEA.gov",url:"bea.gov",note:"GDP and PCE source"},
    {name:"ISM Website",url:"ism.ws",note:"ISM Manufacturing PMI"},
    {name:"CME Group",url:"cmegroup.com",note:"Fed Funds Futures"},
  ];

  function renderSources(){
    const grid=document.getElementById("sources-grid");
    sources.forEach(s=>{grid.innerHTML+=`<div class="src-card"><div class="src-name">${s.name}</div><div class="src-url">${s.url}</div><div class="src-note">${s.note}</div></div>`;});
  }

  document.getElementById("datestamp").textContent=
    "Dow Jones U.S. Completion TSM Index · "+
    new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

  buildAlertBar();renderTabs();renderGroups();renderSources();fetchAll();
</script>
